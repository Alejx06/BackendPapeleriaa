<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SHALOM PAPELERÍA</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        // Protección de Ruta
        if (sessionStorage.getItem('adminAuth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .admin-header h1 {
            font-size: 2rem;
            color: var(--text-main);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        
        /* Table Styles */
        .admin-table-container {
            background: var(--surface);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        tr:hover {
            background: #f8fafc;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-active { background: #e8f5e9; color: var(--success); }
        .status-inactive { background: #ffebee; color: var(--danger); }
        
        .action-btns button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            margin-right: 0.5rem;
            transition: color 0.2s;
        }
        .btn-edit { color: var(--secondary); }
        .btn-edit:hover { color: #0d47a1; }
        .btn-delete { color: var(--danger); }
        .btn-delete:hover { color: #b71c1c; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.open {
            display: flex;
        }
        .modal-content {
            background: var(--surface);
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h2 { font-size: 1.5rem; }
        .modal-close {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn-cancel {
            background: var(--bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Main Header (Admin Mode) -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-cog text-primary"></i> SHALOM<span class="text-primary"> Admin</span>
            </div>
            
            <div class="header-actions">
                <a href="#" onclick="cerrarSesion()" style="text-decoration: none; display: flex; align-items: center; gap: 0.5rem; color: var(--danger); font-weight: 500;">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </a>
            </div>
        </div>
    </header>

    <main class="admin-container">
        <div class="admin-header">
            <h1>Gestión de Inventario</h1>
            <button class="btn-primary" onclick="abrirModal()">
                <i class="fas fa-plus"></i> Nuevo Producto
            </button>
        </div>

        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <!-- Products injected here -->
                    <tr><td colspan="7" style="text-align:center;">Cargando inventario...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuevo Producto</h2>
                <button class="modal-close" onclick="cerrarModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="productForm" onsubmit="guardarProducto(event)">
                <input type="hidden" id="prodId">
                <div class="form-group">
                    <label>Nombre del Producto *</label>
                    <input type="text" id="prodNombre" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <input type="text" id="prodCategoria" placeholder="Ej: Cuadernos, Escritura...">
                </div>
                <div class="form-group">
                    <label>URL de la Imagen (Opcional)</label>
                    <input type="url" id="prodImagenUrl" placeholder="https://ejemplo.com/imagen.jpg">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Precio ($) *</label>
                        <input type="number" step="0.01" id="prodPrecio" required min="0">
                    </div>
                    <div class="form-group">
                        <label>Stock *</label>
                        <input type="number" id="prodStock" required min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="prodDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="prodActivo">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btnGuardar">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="admin.js"></script>
</body>
</html>
